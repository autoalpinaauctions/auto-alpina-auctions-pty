<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Upload Vehicles</title>
</head>
<body>
    <h1>Admin Panel</h1>
    <form action="/upload" method="POST" enctype="multipart/form-data">
        <label for="vehicle">Choose vehicle file:</label>
        <input type="file" id="vehicle" name="vehicle" accept="image/*, .pdf"><br><br>
        <input type="submit" value="Upload Vehicle">
    </form>
</body>
</html>
